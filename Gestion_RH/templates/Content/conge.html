{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'Gestion_RH/css/congeStyle.css'%} ?v=2">
    <link rel="shortcut icon" href="{% static 'Gestion_RH/img/R.png' %}" type="image/x-icon">
    <title>GRH Admin|Congé</title>
</head>
<body>
    <div class="contenu">
        <div class="cards">
            <h1>Cards</h1>
        </div>
        <div class="liste">
            <div class="menuconge">
                <div class="dropdown">
                    <button class="btn p-50 border-0 bg-transparent " data-bs-toggle="dropdown" style="border: none; background: transparent; color: #05fbf7;">
                      <i class="fa-solid fa-shield-halved fa-lg ico"></i>
                        <!-- {% if filtre %}
                            {{filtre}}
                        {% endif %} -->
                    </button>
                  
                    <ul class="dropdown-menu dropdown-menu">
                        <li>
                            <!-- <a href="{% url 'filtre' 'Tout' %}" class="dropdown-item" style="color: #05fbf7;"> -->
                            <i class="fa-solid fa-people-group" style="color: #05fbf7;"></i>
                            Tout
                        </a>
                        </li>
                        <!-- {% for u in unite %}
                        <li>
                            <a href="{% url 'filtre' u %}" class="dropdown-item">{{u}}</a>
                        </li>
                        {% endfor %} -->
                    </ul>
                </div>
                <div class="dropdown">
                    <button class="btn p-50 border-0 bg-transparent dr" id="d_r" data-bs-toggle="dropdown" style="border: none; background: transparent; color: #05fbf7;">
                      <i class="fa-solid fa-clipboard-list fa-lg ico"></i>
                        <!-- {% if sort %}
                            {{sort}}
                        {% endif %} -->
                        sort
                    </button>
                
                    <ul class="dropdown-menu dropdown-menu">
                       <li><a href="{% url 'trie' 'nom'%}" class="dropdown-item">nom</a></li>
                       <li><a href="{% url 'trie' 'prenom'%}"class="dropdown-item">prenom</a></li>
                       <li><a href="{% url 'trie' 'date_embauche'%}"class="dropdown-item">date d'embauche</a></li>
                       <li><a href="{% url 'trie' 'date_ajout'%}"class="dropdown-item">date d'ajout</a></li>
                       <li><a href="{% url 'trie' 'date_naissance'%}"class="dropdown-item">date de naissance</a></li>
                       <li><a href="{% url 'trie' 'matricule'%}"class="dropdown-item">matricule</a></li>
                       <li><a href="{% url 'trie' 'unite'%}"class="dropdown-item">unite</a></li>
                    </ul>
                </div>
            
                <div class="dropdown">
                    <button class="btn p-50 border-0 bg-transparent dr"
                        data-bs-toggle="dropdown" style="border: none; background: transparent; color: #05fbf7;">
                        <i class="fa-solid fa-ellipsis-horizontal fa-lg"></i>
                    </button>

                    <ul class="dropdown-menu dropdown-menu" >
                        <li><a href="{% url 'order' 'croissant'%}" class="dropdown-item">croissant</a></li>
                        <li><a href="{% url 'order' 'decroissant'%}" class="dropdown-item">decroissant</a></li>
                    </ul>
                </div>
            </div>
            <div class="listeconge">
                <div class="listenav">
                    <button type="button" class="liste_g" onclick="retreciMenu()">
                        <i class="fa-solid fa-arrow-left fa-lg fleche"></i>
                    </button>
                    <button type="button" class="rech_btn">
                        <i class="fa-solid fa-magnifying-glass fa-lg input-icon"></i>
                    </button>
                </div>
                <div class="vrai_liste">
                    <h1>Listes</h1>
                </div>
            </div>
            <div class="floating-search">
                <form action="{% url 'rechercher' %}" method="post">
                    {% csrf_token %}
                    <div class="entrer_recherche">
                        <div class="inputfotsn">
                            <input class="form-control me-2" type="search" name="recherch" placeholder="Recherch...." aria-label="Search" id="recherch1">
                        </div>
                        <button type="submit" class="btn_rech"><i class="fa-solid fa-magnifying-glass fa-lg input-icon"></i></button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="{% static 'Gestion_RH/js/congeScript.js' %} ?v=2"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.14.0-beta3/dist/js/bootstrap-select.min.js"></script>
</body>
