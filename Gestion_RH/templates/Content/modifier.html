{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-select@1.14.0-beta3/dist/css/bootstrap-select.min.css">
    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'Gestion_RH/css/ajouterStyle.css'%} ?v=2">
    <link rel="shortcut icon" href="{% static 'Gestion_RH/img/R.png' %}" type="image/x-icon">
    <title>GRH Admin</title>
</head>
<body>
    <div class="container">
        <form method="post" id="form1" enctype="multipart/form-data" action="{% url 'modifier' employe.id %}" novalidate>
            {% csrf_token %}
            <!-- <input type="hidden" name="form_name" value="form1"> -->
            <div class="le_form">
                <div class="tt">
                    <div class="title">
                        <i class="fa-solid fa-user fa-2x ico"></i>
                        <h4>Info Perso</h4>
                    </div>
                </div>
                <div class="card-body">
                        <!-- Info Perso -->
                        <div class="mb-3">
                            <div class="form-group">
                                <input type="text" name="nom" id="inp1" value="{{employe.nom}}"  required >
                                <label for="nom" id="lb1">Nom ...</label>    
                            </div>  
                        </div>
                          
                        <div class="mb-3">
                            <div class="form-group">
                                <input type="text" name="prenom" id="inp2" value="{{employe.prenom}}"  required>
                                <label for="prenom" id="lb2">Prenom ...</label>
                            </div>  
                        </div>
                        <div class="mb-3">
                            <label for="date_naissance" class="form-label">Date de Naissance:</label>
                            <input type="date" class="form-control" id="date_naissance" value="{{employe.date_naissance|date:'Y-m-d'}}"  name="date_naissance" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Genre:</label>
                            <select class="selectpicker"
                                    name="genre"
                                    id="gender"
                                    data-width="100%"
                                    title="Choisir le genre"
                                    required>
                                <option value="Homme" data-icon="fa-solid fa-person"
                                {% if employe.genre == 'Homme' %}selected{% endif%}>
                                    Homme
                                </option>
                                <option value="Femme" data-icon="fa-solid fa-person-dress"
                                {% if employe.genre == 'Femme' %}selected{% endif%}>
                                    Femme
                                </option>
                            </select>
                        </div>
                        <button  type="button" class="btn btn-success w-100 h-45 suivant">
                            Suivant
                        </button>
            </div>
            <!-- info suplementaire -->
            <div class="info_sup">
                <div class="tt">
                    <div class="title">
                        <i class="fa-solid fa-user fa-2x ico"></i>
                        <h4>Info Suplementaire</h4>
                    </div>
                </div>
                <div class="card-body">
                        <!-- Info Perso -->
                        <div class="mb-3">
                            <div class="form-group">
                                <input type="text" name="pere" id="inp3" value="{{employe.pere}}"  required>
                                <label for="nom" id="lb3">Père...</label>
                            </div>  
                        </div>
                        <div class="mb-3">
                            <div class="form-group">
                                <input type="text" name="mere" id="inp4" value="{{employe.mere}}"  required>
                                <label for="prenom" id="lb4">Mère...</label>
                            </div>  
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Situation Maritale:</label>
                            <select class="selectpicker"
                                    name="situation_maritale"
                                    id="s_m"
                                    data-width="100%"
                                    title="Choisir situation maritale"
                                    required>
                                <option value="Marié" data-icon="fa-solid fa-user-group"
                                {% if  'ari' in employe.situation_maritale %}selected{% endif%}>
                                    Marié
                                </option>
                                <option value="Celibataire" data-icon="fa-solid fa-user"
                                {% if 'libataire' in employe.situation_maritale  %}selected{% endif%}>

                                    Celibataire
                                </option>
                                
                                <option value="Divorcé" data-icon="fa-solid fa-user"
                                {% if 'ivorc' in employe.situation_maritale  %}selected{% endif%}>
                                    Divorcé
                                </option>
                            </select>
                        </div>
                        <div class="form-floating mb-3">
                            <textarea class="form-control"
                                      placeholder="Écrire ici..."
                                      id="d_e"
                                      name="diplome_experience"
                                      style="height: 120px">
                                {{employe.diplome_experience}}        
                            </textarea>
                        
                            <label for="comment">
                                <i class="fa-solid fa-pen"></i>
                                Diplome&Expérience
                            </label>
                        </div>                        
                        <div class="svt">
                            <button type="button" class="btn btn-primary w-100 h-45 precedent">
                                Precédent
                            </button>
                            <button type="button" class="btn btn-success w-100 h-45 suivant1">
                                Suivant
                            </button>
                        </div>
                    </div>
            </div>
            <!-- contact -->
            <div class="contact">
                <div class="tt">
                    <div class="title">
                        <i class="fa-solid fa-address-book fa-2x ico"></i>
                        <h4>contact & adresse & photo</h4>
                    </div>
                </div>
                <div class="card-body">
                        <!-- contact -->
                        <div class="mb-3">
                            <div class="form-group">
                                <input type="text" name="adresse" id="inp5" value="{{employe.adresse}}" required>
                                <label for="Adresse" id="lb5">Adresse...</label>
                                <i class="fa-solid fa-location-dot input-icon"></i> 
                            </div>  
                        </div>
                        <div class="mb-3">
                            <div class="form-group">
                                <input type="email" name="email" id="inp6" value="{{employe.email}}" required>
                                <label for="Email" id="lb6">Email...</label>
                                <i class="fa-solid fa-envelope input-icon"></i>
                            </div>  
                        </div>
                        <div class="mb-3">
                            <div class="form-group">
                                <input type="number" name="telephone" id="inp7" value="{{employe.telephone}}" required>
                                <label for="Telephone" id="lb7">Telephone...</label>
                                <i class="fa-solid fa-phone input-icon"></i>
                            </div>  
                        </div>    
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fa-solid fa-image"></i> Photo
                            </label>
                            <input type="file"
                                   name="photo"
                                   class="form-control"
                                   accept="image/*">
                                   
                        </div>                   
                        <div class="svt">
                            <button type="button" class="btn btn-primary w-100 h-45 precedent1">
                                Precédent
                            </button>
                            <button type="button" class="btn btn-success w-100 h-45 svt1">
                                Suivant
                            </button>
                        </div>
                </div>
            </div>
            <!-- validation -->
            <div class="poste">
                <div class="tt">
                    <div class="title">
                        <i class="fa-solid fa-shield-halved fa-2x ico"></i>
                        <h4>Unité & Grade</h4>
                    </div>
                </div>
                <div class="card-body">
                        <!-- validation -->
                        <div class="mb-3">
                            <div class="form-group">
                                <input type="text" name="unite" id="inp11" value="{{employe.unite}}" required>
                                <label for="Adresse" id="lb11">Unité actuel...</label>
                                <i class="fa-solid fa-flag input-icon"></i>
                            </div>  
                        </div>
                        <div class="mb-3">
                            <div class="form-group">
                                <input type="text" name="unite_ancien" id="inp9" value="{{employe.unite_ancien}}" required>
                                <label for="Adresse" id="lb9">Unité ancienne...</label>
                                <i class="fa-solid fa-people-group input-icon"></i>
                            </div>  
                        </div>
                        <div class="mb-3">
                            <div class="form-group">
                                <input type="text" name="grade" id="inp8" value="{{employe.grade}}" required>
                                <label for="Adresse" id="lb8">Grade...</label>
                                <i class="fa-solid fa-medal input-icon"></i>
                            </div>  
                        </div>
                        <div class="mb-3">
                            <div class="form-group">
                                <input type="number" name="matricule" id="inp10"  value="{{employe.matricule}}" required>
                                <label for="matricule" id="lb10">Matricule ...</label>
                                <i class="fa-solid fa-id-card input-icon"></i> 
                            </div>  
                        </div>
                        <div class="mb-3">
                            <label for="date_embauche" class="form-label">Date d'embauche:</label>
                            <input type="date" class="form-control" id="date" name="date_embauche" value="{{employe.date_embauche|date:'Y-m-d'}}">
                        </div>
                                    
                        <div class="svt">
                            <button type="button" class="btn btn-primary w-100 h-45 precedent2">
                                Precédent
                            </button>
                            <button type="submit" class="btn btn-success w-100 h-45 ">
                                Valider
                            </button>
                        </div>
                </div>
            </div>
        </form> 
        </div>
    </div>
    <div class="ret">
        <a href="{% url 'home' %}">
            <i class="fa-solid fa-arrow-left fa-2x"></i>
        </a>
    </div>
    {% csrf_token %}
    {% if error %}
        <div class="error">
            <small class="text-danger">{{ error }}</small>
        </div>
    {% endif %}
    <!-- Loader -->
    <div id="loader" style="display:none;">
        <div class="spinner"></div>
        <p>Chargement...</p>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.14.0-beta3/dist/js/bootstrap-select.min.js"></script>
    <script src="{% static 'Gestion_RH/js/ajouterScript.js' %}?v=2"></script>
</body>
</html>
